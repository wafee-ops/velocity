name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package app artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\velocity-windows | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\velocity.exe dist\velocity-windows\velocity.exe
          Copy-Item README.md dist\velocity-windows\README.md
          Copy-Item target\x86_64-pc-windows-msvc\release\velocity.exe dist\velocity-windows.exe
          Compress-Archive -Path dist\velocity-windows\* -DestinationPath dist\velocity-windows.zip -Force

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-windows
          path: |
            dist/velocity-windows.exe
            dist/velocity-windows.zip
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/velocity-windows.exe
            dist/velocity-windows.zip
