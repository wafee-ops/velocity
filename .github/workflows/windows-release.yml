name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Install WiX
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install WiX tool
        shell: powershell
        run: dotnet tool install --global wix --version 5.*

      - name: Package app artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\velocity.exe dist\velocity.exe
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          wix build wix\velocity.wxs `
            -d ProductVersion=$version `
            -d TargetPath=target\x86_64-pc-windows-msvc\release\velocity.exe `
            -arch x64 `
            -out dist\velocity.msi

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-windows
          path: |
            dist/velocity.exe
            dist/velocity.msi
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/velocity.exe
            dist/velocity.msi
