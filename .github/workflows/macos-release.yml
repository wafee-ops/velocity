name: macOS Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apple-silicon
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: velocity-macos-apple-silicon

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package DMG artifact
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="Velocity.app"
          APP_DIR="dist/${APP_NAME}"
          DMG_NAME="velocity.dmg"

          mkdir -p "${APP_DIR}/Contents/MacOS" "${APP_DIR}/Contents/Resources"
          cp "target/${{ matrix.target }}/release/velocity" "${APP_DIR}/Contents/MacOS/Velocity"
          chmod +x "${APP_DIR}/Contents/MacOS/Velocity"
          cp assets/icon.ico "${APP_DIR}/Contents/Resources/icon.ico"

          cat > "${APP_DIR}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>Velocity</string>
            <key>CFBundleIconFile</key>
            <string>icon.ico</string>
            <key>CFBundleIdentifier</key>
            <string>dev.wafee.velocity</string>
            <key>CFBundleName</key>
            <string>Velocity</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          hdiutil create \
            -volname "Velocity" \
            -srcfolder "${APP_DIR}" \
            -ov \
            -format UDZO \
            "dist/${DMG_NAME}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/velocity.dmg
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/velocity.dmg
