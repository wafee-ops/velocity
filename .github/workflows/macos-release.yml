name: macOS Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: intel
            runner: macos-13
            target: x86_64-apple-darwin
            artifact_name: velocity-macos-intel
          - name: apple-silicon
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: velocity-macos-apple-silicon

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package app artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp target/${{ matrix.target }}/release/velocity dist/${{ matrix.artifact_name }}/velocity
          cp README.md dist/${{ matrix.artifact_name }}/README.md
          cd dist
          zip -r ${{ matrix.artifact_name }}.zip ${{ matrix.artifact_name }}

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}.zip
